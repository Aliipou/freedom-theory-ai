name: Generate Book PDF

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "THEORY.md"
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc + LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-lang-arabic fonts-noto

      - name: Generate Theory of Freedom PDF (English)
        run: |
          pandoc book/theory_of_freedom_complete_en.md \
            -o book/theory_of_freedom_en.pdf \
            --pdf-engine=xelatex \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable colorlinks=true \
            --toc \
            --toc-depth=2 \
            --metadata title="Theory of Freedom, Iran and Religion" \
            --metadata author="Mohammad Ali Jannat Khah Doust" \
            --metadata date="2026"

      - name: Generate THEORY reference PDF
        run: |
          pandoc THEORY.md \
            -o book/theory_reference.pdf \
            --pdf-engine=xelatex \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable colorlinks=true \
            --metadata title="Theory of Freedom — Formal Reference" \
            --metadata author="Mohammad Ali Jannat Khah Doust"

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: theory-of-freedom-pdfs
          path: book/*.pdf
          retention-days: 90

      - name: Commit PDFs to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: regenerate book PDFs"
          file_pattern: "book/*.pdf"
          commit_author: "Mohammad Ali Jannat Khah Doust <author@freedom-theory.ai>"
